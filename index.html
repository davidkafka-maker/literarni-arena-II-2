<!DOCTYPE html>

<title>Literární aréna II/2</title>
<style>
:root{

}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top,#542014 0,#160806 45%,#050101 100%);color:var(--text);touch-action:manipulation;overscroll-behavior:none}
body.mode-training{background:radial-gradient(circle at top,#10364a 0,#160806 52%,#030101 100%)}
body.mode-mini{background:radial-gradient(circle at top,#35205b 0,#160806 52%,#030101 100%)}
body.mode-challenge{background:radial-gradient(circle at top,#233f16 0,#160806 52%,#030101 100%)}
body.mode-test{background:radial-gradient(circle at top,#5a1717 0,#160806 52%,#030101 100%)}
.wrap{max-width:980px;margin:0 auto;padding:14px;min-height:100%;display:flex;flex-direction:column;gap:12px}

.card.training{border-color:rgba(112,224,255,.8);box-shadow:0 0 0 2px rgba(112,224,255,.14),0 14px 36px rgba(0,0,0,.45)}
.card.mini{border-color:rgba(212,163,255,.86);box-shadow:0 0 0 2px rgba(212,163,255,.16),0 14px 36px rgba(0,0,0,.45)}
.card.challenge{border-color:rgba(185,255,131,.86);box-shadow:0 0 0 2px rgba(185,255,131,.16),0 14px 36px rgba(0,0,0,.45)}
.card.test{border-color:rgba(255,154,154,.9);box-shadow:0 0 0 2px rgba(255,154,154,.16),0 14px 36px rgba(0,0,0,.45)}
.title{text-align:center;font-size:clamp(30px,6vw,62px);font-weight:1000;color:var(--gold);letter-spacing:.03em;text-shadow:0 2px 0 #5d260a,0 0 24px rgba(255,176,46,.36);margin:10px 0}
.subtitle{text-align:center;color:var(--muted);font-size:clamp(15px,2.4vw,20px);margin:0 0 16px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.sectionList{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.trainCard{display:grid;grid-template-columns:1.2fr .8fr;gap:8px;align-items:stretch;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:10px}
.btn{appearance:none;border:0;border-radius:16px;padding:14px 16px;background:linear-gradient(180deg,#ffd36a,#b96617);color:#2b1206;font-weight:1000;font-size:17px;cursor:pointer;box-shadow:0 8px 0 #612507,0 10px 20px rgba(0,0,0,.35);user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:active{transform:translateY(4px);box-shadow:0 4px 0 #612507}.btn.secondary{background:linear-gradient(180deg,#f0d6a6,#9a6b2f);box-shadow:0 8px 0 #4c3215}.btn.trainingBtn{background:linear-gradient(180deg,#8cecff,#15738a);box-shadow:0 8px 0 #073646;color:#06212a}.btn.miniBtn{background:linear-gradient(180deg,#e2bbff,#7c38bd);box-shadow:0 8px 0 #37165d;color:#1c082e}.btn.challengeBtn{background:linear-gradient(180deg,#d0ff9e,#4d9a26);box-shadow:0 8px 0 #1d4a10;color:#082000}.btn.testBtn{background:linear-gradient(180deg,#ffb1a9,#c82e2e);box-shadow:0 8px 0 #661111;color:#fff}.btn.ghost{background:rgba(255,211,106,.12);color:var(--gold);border:1px solid rgba(255,211,106,.35);box-shadow:none}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center}.topbar{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;font-weight:1000;color:var(--gold);font-size:clamp(14px,2.5vw,20px)}.topbar>div:nth-child(2){font-size:clamp(20px,4.8vw,34px);color:#fff}.badge{display:inline-block;border-radius:999px;padding:5px 12px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18)}
.modeLine{text-align:center;color:var(--muted);font-weight:900}.promptType{text-align:center;font-weight:1000;font-size:clamp(16px,3vw,25px);margin:6px 0;color:var(--train)}.challenge .promptType{color:var(--challenge)}.test .promptType{color:var(--test)}.mini .promptType{color:var(--mini)}
.clueBox{border:2px solid rgba(255,211,106,.55);border-radius:18px;padding:12px;background:rgba(0,0,0,.25);font-size:clamp(17px,3.8vw,29px);font-weight:1000;text-align:center;line-height:1.22}.clues{display:flex;flex-direction:column;gap:8px}.clue{padding:8px 10px;border-radius:12px;background:rgba(255,255,255,.07)}
.answerRow{display:flex;gap:10px;margin-top:12px}.input{flex:1;border:2px solid rgba(255,211,106,.45);border-radius:16px;padding:15px;font-size:22px;background:#fff8e8;color:#1a0804;font-weight:900;min-width:0}.feedback{text-align:center;font-size:clamp(18px,3.9vw,30px);font-weight:1000;min-height:46px;margin:6px}.ok{color:var(--ok)}.bad{color:var(--bad);text-shadow:0 0 16px rgba(255,0,0,.55)}.small{font-size:14px;color:var(--muted)}
.correctAnswer{
  display:inline-block;
  margin-top:6px;
  padding:8px 12px;
  border-radius:14px;
  background:rgba(255,211,106,.16);
  border:1px solid rgba(255,211,106,.45);
  color:#fff7df;
  font-size:clamp(22px,5vw,40px);
  font-weight:1000;
  line-height:1.15;
}
.nameBox{display:flex;flex-direction:column;gap:10px;max-width:520px;margin:0 auto}.result{font-size:22px;line-height:1.5;text-align:center}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden}.piece{position:absolute;width:10px;height:16px;background:var(--gold);animation:fall 1.8s linear forwards}@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.2}}
.cheat{border-color:#ff2f2f;background:linear-gradient(180deg,rgba(92,8,8,.98),rgba(23,0,0,.98))}.cheat .title{color:#ffdddd;text-shadow:0 0 20px #ff0000}
@media(max-width:700px){.wrap{padding:8px;gap:8px}.card{padding:12px;border-radius:16px}.grid,.sectionList{grid-template-columns:1fr}.trainCard{grid-template-columns:1fr}.answerRow{flex-direction:column}.btn{font-size:16px;padding:13px}.input{font-size:20px}.topbar{grid-template-columns:1fr;text-align:center}.topbar>div:nth-child(2){order:-1}.row .btn{flex:1 1 140px}.clueBox{padding:9px;font-size:clamp(16px,4.2vw,24px)}.feedback{font-size:clamp(17px,4vw,26px)}.correctAnswer{font-size:clamp(23px,6vw,34px)}.title{margin:2px 0 8px}.subtitle{margin-bottom:8px}}

}
.mistakeMode .input{

}

}

}
.correctAnswer{

  margin-top:8px;
  padding:10px 14px;
  border-radius:16px;
  background:rgba(255,211,106,.18);
  border:1px solid rgba(255,211,106,.52);

@media(max-width:700px){

/* Mobilně úsporný režim po chybě: zůstává původní tlačítko POTVRDIT. */

function norm(s){
  return (s||'').toString().trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[.,;:!?()„“"'`´]/g,' ')
    .replace(/\s+/g,' ');
}
function editDistanceOneOrLess(a,b){
  a=norm(a); b=norm(b);
  if(a===b)return true;
  if(Math.abs(a.length-b.length)>1)return false;
  let i=0,j=0,diff=0;
  while(i<a.length && j<b.length){
    if(a[i]===b[j]){i++;j++;continue;}
    diff++;
    if(diff>1)return false;
    if(a.length===b.length){i++;j++;}
    else if(a.length>b.length){i++;}
    else{j++;}
  }
  if(i<a.length || j<b.length)diff++;
  return diff<=1;
}
function okAnswer(input,item){
  return item.answers.some(a=>editDistanceOneOrLess(input,a));

function shortSectionTitle(title){
  const t = (title || '').toUpperCase();
  if (t.includes('DÍLO')) return 'DÍLA';
  if (t.includes('AUTOŘI')) return 'AUTOŘI';
  if (t.includes('POSTAVY')) return 'POSTAVY';
  if (t.includes('POJMY')) return 'POJMY';
  if (t.includes('FORMA') || t.includes('ŽÁNR') || t.includes('DRUH')) return 'FORMA\nDRUH\nŽÁNR';
  if (t.includes('SMĚR') || t.includes('SKUPINA') || t.includes('OBDOBÍ')) return 'SMĚR\nSKUPINA\nOBDOBÍ';
  return t.replace(/^[IVX]+\.\s*/, '').slice(0, 10);
}

function enableKeyboardLayout(){

    soundWrong();
    state.index++;
    state.awaitNext=true;
  }
}
function startTimer(sec){state.timeLeft=sec;updateTime();state.timer=setInterval(()=>{state.timeLeft--;updateTime();if(state.timeLeft<=0){clearTimer();timeoutAnswer();}},1000)}
function updateTime(){let el=document.getElementById('time');if(el)el.textContent=state.timeLeft;}
function clearTimer(){if(state.timer){clearInterval(state.timer);state.timer=null}}
function timeoutAnswer(){
  if(state.locked)return;
  state.locked=true;
  state.awaitNext=true;
  state.wrong++;
  state.streak=0;
  let fb=document.getElementById('feedback');
  let submitBtn=document.getElementById('submitBtn');
  const card=document.querySelector('.card');
  if(card)card.classList.add('mistakeMode');
  if(fb)fb.innerHTML=`<span class="bad">ČAS VYPRŠEL</span><br><span class="small">Správně:</span><br><span class="correctAnswer">${esc(state.current.answers[0])}</span>`;
  if(submitBtn)submitBtn.textContent='DALŠÍ OTÁZKA';
  soundWrong();
  state.index++;
}
function grade(score,total){let p=score/total;if(p>=0.88)return 1;if(p>=0.75)return 2;if(p>=0.56)return 3;if(p>=0.38)return 4;return 5;}
function finish(kind){clearTimer();state.screen='finish';let total=kind==='challengeWin'?10:state.questions.length;let znamka = kind==='challengeWin'?1:grade(state.score,total);if(state.cheated)znamka=6;let title=kind==='challengeWin'?'MÁŠ JEDNIČKU!':'VÝSLEDEK';if(znamka===1)confetti();sendResult(znamka,total,kind);render(`<div class="card ${state.mode}"><h1 class="title">${title}</h1><div class="result"><b>Jméno:</b> ${esc(state.name||'—')}<br><b>Třída:</b> ${esc(state.clazz||'—')}<br><b>Režim:</b> ${modeLabel()}<br><b>Body:</b> ${state.score}/${total}<br><b>Známka:</b> ${znamka}</div><div class="row" style="margin-top:18px"><button class="btn" data-action="home">HLAVNÍ MENU</button><button class="btn secondary" data-action="trainingMenu">TRÉNINK</button><button class="btn ghost" type="button" onclick="window.open(RESULTS_SHEET_URL, '_blank')">📊 VÝSLEDKOVÁ TABULKA</button></div><p class="small" style="text-align:center">Výsledek se odesílá do tabulky.</p></div>`, state.mode)}
function cheatFinish(reason){if(!activeProtected())return;state.cheated=true;state.locked=true;state.screen='finish';clearTimer();soundCheat();let total=state.questions.length||0;sendResult(6,total,'PODVOD: '+reason,true);render(`<div class="card cheat"><h1 class="title">PODVOD</h1><div class="result"><b>Pokus byl ukončen.</b><br>Bylo zjištěno opuštění testovacího okna.<br><br><b>Známka:</b> 6</div><div class="row" style="margin-top:18px"><button class="btn" data-action="home">HLAVNÍ MENU</button><button class="btn ghost" type="button" onclick="window.open(RESULTS_SHEET_URL, '_blank')">📊 VÝSLEDKOVÁ TABULKA</button></div></div>`, 'test')}
function buildPayload(znamka,total,kind){return {timestamp:new Date().toISOString(),jmeno:state.name,trida:state.clazz,rezim:state.mode,oddil:state.section?state.section.title:'mix',znamka,body:state.score,celkem:total,spravne:state.score,spatne:state.wrong,poznamka:state.cheated?'PODVOD':kind,sheetId:SHEET_ID,app:'Literární aréna II/2'}}
function sendResult(znamka,total,kind,urgent=false){
  if(state.finishSent && !urgent)return;
  state.finishSent=true;
  const payload=buildPayload(znamka,total,kind);
  payload.odeslano = "ano";
  localStorage.setItem('literarniArenaII2_lastResult',JSON.stringify(payload));

  try{
    if(!GAS_WEB_APP_URL) throw new Error("Chybí GAS_WEB_APP_URL");
    const params = new URLSearchParams();
    Object.entries(payload).forEach(([k,v]) => params.append(k, v == null ? "" : String(v)));
    const body = params.toString();

    if(urgent && navigator.sendBeacon){
      const blob = new Blob([body], {type:'application/x-www-form-urlencoded;charset=UTF-8'});
      navigator.sendBeacon(GAS_WEB_APP_URL, blob);
    }else{
      fetch(GAS_WEB_APP_URL,{
        method:'POST',
        mode:'no-cors',
        headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},
        body,
        keepalive:true
      }).catch(err=>{
        localStorage.setItem('literarniArenaII2_pendingResult',JSON.stringify(payload));
      });
    }
  }catch(e){
    localStorage.setItem('literarniArenaII2_pendingResult',JSON.stringify(payload));
  }
}
function tone(freq,dur,gain=.08,type='sine',delay=0){try{unlockAudio();if(!audioCtx)return;let t=audioCtx.currentTime+delay;let o=audioCtx.createOscillator();let g=audioCtx.createGain();o.type=type;o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(gain,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur+0.03);}catch(e){}}
function soundCorrect(){tone(720,.08,.06,'sine');tone(980,.10,.05,'sine',.07)}
function soundWrong(){tone(150,.20,.22,'square');tone(110,.23,.20,'sawtooth',.17);tone(80,.22,.18,'square',.34)}
function soundCheat(){tone(95,.65,.28,'sawtooth');tone(70,.65,.24,'square',.35);tone(95,.65,.28,'sawtooth',.72)}
function confetti(){let box=document.getElementById('confetti');for(let i=0;i<90;i++){let p=document.createElement('div');p.className='piece';p.style.left=Math.random()*100+'vw';p.style.top='-20px';p.style.animationDelay=Math.random()*0.8+'s';p.style.background=['#ffd36a','#ff6b6b','#74f0a0','#9fd4ff'][i%4];box.appendChild(p);setTimeout(()=>p.remove(),2700)}}
document.addEventListener('visibilitychange',()=>{if(document.hidden)cheatFinish('přepnutí mimo stránku');});
window.addEventListener('pagehide',()=>{cheatFinish('opuštění stránky');});
window.addEventListener('blur',()=>{setTimeout(()=>{if(activeProtected() && document.visibilityState==='visible' && !document.hasFocus()) cheatFinish('ztráta aktivního okna');},650);});
const actions={home,trainingMenu,nameChallenge:()=>nameScreen('challenge'),nameTest:()=>nameScreen('test'),nameMini:(d)=>nameScreen('mini',d.key),startTraining:(d)=>startTraining(d.key)};
home();
</script>
